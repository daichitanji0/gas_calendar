<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boccale - 安心カレンダー</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --beaker-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 0 9 10"><path d="M -2 0 L 6 0 Q 7 0 7 1 L 7 9 Q 7 10 6 10 L 0 10 Q -1 10 -1 9 L -1 1 Q -1 0 -2 0" fill="black"/></svg>');
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Nunito', sans-serif; 
            background-color: #2b2b2b; color: #333; 
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
        }

        #setupScreen { background: white; padding: 40px; border-radius: 20px; text-align: center; }
        .btn { padding: 12px 24px; background-color: #4285F4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        #mainApp { 
            background-color: #c9e9ea; padding: 15px; border-radius: 25px; 
            gap: 15px; width: 98vw; height: 94vh; box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: none; flex-direction: row;
        }

        .calendar-section {
            flex: 1; display: flex; flex-direction: column; height: 100%;
            /* スクロールイベントをここで受け取るための設定 */
            touch-action: none; 
        }

        .calendar-header {
            display: flex; align-items: flex-end; margin-bottom: 10px; padding: 8px 20px;
            background-color: #f0fdfd; height: 70px; box-sizing: border-box;
            -webkit-mask-box-image-source: var(--beaker-mask);
            -webkit-mask-box-image-slice: 20% fill;
            -webkit-mask-box-image-width: 15px;
            -webkit-mask-box-image-repeat: stretch;
            mask-border-source: var(--beaker-mask);
            mask-border-slice: 20% fill;
            mask-border-width: 15px;
            mask-border-repeat: stretch;
        }

        .month-display { display: flex; flex-direction: column; align-items: flex-start; margin-right: 20px; }
        .year-number { font-size: 14px; font-weight: 700; color: #888; line-height: 1; font-family: 'Nunito', sans-serif;}
        .month-number { font-size: 48px; font-weight: 700; line-height: 0.9; font-family: 'Caveat', cursive;}

        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr); flex: 1;
            font-family: 'Caveat', cursive; font-size: 24px; text-align: center;
        }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr);
            gap: 8px; flex: 1;
            /* クニュっとアニメーションの起点 */
            transform-origin: center center;
            will-change: transform, opacity;
        }

        .calendar-day {
            padding: 5px 8px; position: relative;
            font-family: 'Caveat', cursive; font-size: 18px; font-weight: 700;
            overflow: hidden;

            -webkit-mask-box-image-source: var(--beaker-mask);
            -webkit-mask-box-image-slice: 20% fill;
            -webkit-mask-box-image-width: 15px;
            -webkit-mask-box-image-repeat: stretch;
            mask-border-source: var(--beaker-mask);
            mask-border-slice: 20% fill;
            mask-border-width: 15px;
            mask-border-repeat: stretch;

            /* 色がスムーズに溶けるアニメーション設定 */
            transition: background-color 0.6s ease-in-out, color 0.6s ease-in-out;
        }

        .day-prev { background-color: #a8ffff; color: #72d6d6; }
        .day-current { background-color: #ffffff; color: #444; }
        .day-next { background-color: #ffe89e; color: #e5c45e; }
        .color-sun { color: #ff5b5b !important; }
        .color-sat { color: #9c65ff !important; }

        /* スクロール時の「クニュッ」と動くアニメーション */
        @keyframes squishPrev {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            40% { transform: translateY(15px) scale(0.97); opacity: 0.6; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes squishNext {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            40% { transform: translateY(-15px) scale(0.97); opacity: 0.6; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .anim-prev { animation: squishPrev 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .anim-next { animation: squishNext 0.5s cubic-bezier(0.25, 1, 0.5, 1); }

        .task-window { 
            width: 260px; background: #ffffff; padding: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box;
            -webkit-mask-box-image-source: var(--beaker-mask); -webkit-mask-box-image-slice: 20% fill; -webkit-mask-box-image-width: 15px; -webkit-mask-box-image-repeat: stretch;
            mask-border-source: var(--beaker-mask); mask-border-slice: 20% fill; mask-border-width: 15px; mask-border-repeat: stretch;
        }

        .task-list { flex: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        .task-list::-webkit-scrollbar { width: 5px; }
        .task-list::-webkit-scrollbar-thumb { background: #c9e9ea; border-radius: 10px; }

        .task-item { background: #f0fdfd; padding: 10px; margin-bottom: 8px; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: grab; border-left: 5px solid #4285F4; }
        .placed-task { background: #4285F4; color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Nunito', sans-serif;}
        .add-task-btn { font-size: 13px; color: #888; cursor:pointer; border: 2px dashed #eee; padding: 10px; border-radius: 10px; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div id="setupScreen">
    <h1 style="color: #444; font-size: 40px; margin-bottom: 10px; font-family: 'Caveat', cursive;">boccale</h1>
    <button class="btn" onclick="startGuestMode()">アカウント無しでお試し</button>
</div>

<div id="mainApp">
    <div class="calendar-section" id="scrollArea">
        <div class="calendar-header">
            <div class="month-display">
                <div class="year-number" id="currentYearLabel">2026</div>
                <div class="month-number" id="currentMonthLabel">5</div>
            </div>
            <div class="weekdays">
                <div class="color-sun">sun</div><div>mon</div><div>tue</div><div>wed</div><div>thu</div><div>fri</div><div class="color-sat">sat</div>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="task-window">
        <h3 style="margin:0; font-size: 18px;">TODO</h3>
        <div class="add-task-btn" onclick="addNewTaskPrompt()">+ Add Task</div>
        <div class="task-list" id="taskList"></div>
    </div>
</div>

<script>
    // 基準となる表示月（初期値: 2026年5月）
    let displayDate = new Date(2026, 4, 1); 
    // 一時的にタスクを記憶するオブジェクト（月をまたいでも消えないように）
    let tasksMap = {}; 

    function startGuestMode() { 
        document.getElementById("setupScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "flex";
        initCalendarDOM();
        updateCalendarUI(); 
    }

    // 最初に42個の空のボックス（DOM）を作成
    function initCalendarDOM() {
        const grid = document.getElementById("calendarGrid");
        grid.innerHTML = "";
        for(let i=0; i<42; i++) {
            const div = document.createElement("div");
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => {
                const title = e.dataTransfer.getData("text");
                if (!tasksMap[div.id]) tasksMap[div.id] = [];
                tasksMap[div.id].push(title);
                renderTaskOnCell(div, title);
            };
            grid.appendChild(div);
        }
    }

    // カレンダーの中身（日付・色）だけを更新する関数
    function updateCalendarUI() {
        const year = displayDate.getFullYear();
        const month = displayDate.getMonth(); // 0~11

        document.getElementById("currentYearLabel").innerText = year;
        document.getElementById("currentMonthLabel").innerText = month + 1;

        // 月の最初の日の曜日を取得して、カレンダーの開始日を逆算
        const firstDay = new Date(year, month, 1);
        const startOffset = firstDay.getDay(); 
        const startDate = new Date(year, month, 1 - startOffset);

        const cells = document.getElementById("calendarGrid").children;

        for(let i=0; i<42; i++) {
            const cellDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + i);
            const cellY = cellDate.getFullYear();
            const cellM = cellDate.getMonth();
            const cellD = cellDate.getDate();
            const dayOfWeek = cellDate.getDay();

            const cell = cells[i];
            
            // 日付をセットし、前のタスク表示をリセット
            cell.innerHTML = `<span>${cellD}</span>`;
            
            // 一意のIDを付与（例: cell-2026-05-15）
            cell.id = `cell-${cellY}-${String(cellM+1).padStart(2,'0')}-${String(cellD).padStart(2,'0')}`;

            // CSSクラスの判定 (色分け)
            let baseClass = "calendar-day";
            if (cellY < year || (cellY === year && cellM < month)) {
                baseClass += " day-prev"; // 前月（青）
            } else if (cellY > year || (cellY === year && cellM > month)) {
                baseClass += " day-next"; // 翌月（黄）
            } else {
                baseClass += " day-current"; // 当月（白）
            }

            if (dayOfWeek === 0) baseClass += " color-sun";
            if (dayOfWeek === 6) baseClass += " color-sat";

            // 新しいクラスを適用（ここでCSS Transitionにより色がフワッと変わる）
            cell.className = baseClass;

            // 保存されているタスクがあれば再描画
            if (tasksMap[cell.id]) {
                tasksMap[cell.id].forEach(title => renderTaskOnCell(cell, title));
            }
        }
    }

    function renderTaskOnCell(cellDom, title) {
        const el = document.createElement("div");
        el.className = "placed-task";
        el.innerText = title;
        cellDom.appendChild(el);
    }

    // スクロール（ホイール）イベントの制御
    let isAnimating = false;
    document.getElementById("scrollArea").addEventListener('wheel', (e) => {
        if (isAnimating) return; // アニメーション中はスクロールを無視（止まらないように）
        if (Math.abs(e.deltaY) < 30) return; // 軽いタッチは無視

        isAnimating = true;
        const grid = document.getElementById("calendarGrid");
        
        // スクロールの方向判定（上にスクロールで前月、下で翌月）
        const direction = e.deltaY < 0 ? 'prev' : 'next';

        // アニメーションのリセットと再発火
        grid.classList.remove('anim-prev', 'anim-next');
        void grid.offsetWidth; // リフローを強制
        grid.classList.add(direction === 'prev' ? 'anim-prev' : 'anim-next');

        // アニメーションが一番「沈み込んだ」タイミング（約200ms後）で中身を更新
        setTimeout(() => {
            if (direction === 'prev') {
                displayDate.setMonth(displayDate.getMonth() - 1);
            } else {
                displayDate.setMonth(displayDate.getMonth() + 1);
            }
            updateCalendarUI();
        }, 200);

        // アニメーション完了後にロック解除
        setTimeout(() => {
            isAnimating = false;
        }, 500);
    });

    function addNewTaskPrompt() {
        const t = prompt("Task:");
        if (!t) return;
        const el = document.createElement("div");
        el.className = "task-item";
        el.innerText = t;
        el.draggable = true;
        el.ondragstart = (ev) => ev.dataTransfer.setData("text", t);
        document.getElementById("taskList").appendChild(el);
    }
</script>
</body>
</html>
