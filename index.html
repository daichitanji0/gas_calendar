<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boccale - 安心カレンダー</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        /* 全体：標準的なゴシック体に統一 */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            background-color: #2b2b2b; 
            color: #333; 
            height: 100vh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        /* ログイン画面（元のまま） */
        .container { 
            max-width: 500px; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
        }

        #mainApp { 
            display: none; 
            background-color: #c9e9ea; 
            padding: 15px; 
            border-radius: 25px; 
            gap: 15px; 
            width: 98vw;
            height: 94vh; 
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            flex-direction: row;
        }

        /* 新規：左側の縦バー */
        .sidebar-left {
            width: 60px;
            background-color: #f0fdfd;
            border-radius: 15px;
            height: 100%;
            flex-shrink: 0;
            -webkit-mask-image: radial-gradient(circle 15px at 0 0, transparent 15px, black 16px);
            mask-image: radial-gradient(circle 15px at 0 0, transparent 15px, black 16px);
        }

        /* 中央：カレンダーエリア */
        .calendar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0; /* Flexboxの縮みバグ防止 */
        }

        /* カレンダーヘッダー */
        .calendar-header {
            display: flex;
            align-items: flex-end;
            margin-bottom: 10px;
            padding: 8px 20px;
            background-color: #f0fdfd;
            border-radius: 15px;
            height: 70px;
            flex-shrink: 0;
            box-sizing: border-box;
            -webkit-mask-image: radial-gradient(circle 20px at 0 0, transparent 20px, black 21px);
            mask-image: radial-gradient(circle 20px at 0 0, transparent 20px, black 21px);
        }

        .month-number { font-size: 48px; font-weight: 700; line-height: 1; margin-right: 20px; }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex: 1;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            padding-bottom: 5px;
        }

        /* 新規：縦スクロールで月を切り替えるためのビューポート */
        .calendar-viewport {
            flex: 1;
            overflow-y: scroll;
            /* スクロールスナップ：途中で止まらず、必ずグリッドの先頭に吸い付く */
            scroll-snap-type: y mandatory;
            display: flex;
            flex-direction: column;
            gap: 30px; /* 月と月の間の余白 */
            padding-bottom: 30px;
            -ms-overflow-style: none; /* IE, Edge 非表示 */
            scrollbar-width: none; /* Firefox 非表示 */
        }
        .calendar-viewport::-webkit-scrollbar { display: none; } /* Chrome 非表示 */

        /* カレンダーグリッド */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr); 
            gap: 8px;
            height: 100%; 
            flex-shrink: 0;
            scroll-snap-align: start; /* スクロール時にここが上端に吸い付く */
        }

        .calendar-day {
            background: white;
            padding: 5px 8px;
            position: relative;
            font-size: 18px;
            font-weight: 700;
            overflow: hidden;
            
            /* 色の切り替わりをスムーズにする */
            transition: background-color 0.4s ease, color 0.4s ease;

            /* 9スライスマスク */
            -webkit-mask-box-image-source: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 0 9 10"><path d="M -2 0 L 6 0 Q 7 0 7 1 L 7 9 Q 7 10 6 10 L 0 10 Q -1 10 -1 9 L -1 1 Q -1 0 -2 0" fill="black"/></svg>');
            -webkit-mask-box-image-slice: 20% fill; 
            -webkit-mask-box-image-width: 15px; 
            -webkit-mask-box-image-repeat: stretch;
            mask-border-source: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 0 9 10"><path d="M -2 0 L 6 0 Q 7 0 7 1 L 7 9 Q 7 10 6 10 L 0 10 Q -1 10 -1 9 L -1 1 Q -1 0 -2 0" fill="black"/></svg>');
            mask-border-slice: 20% fill;
            mask-border-width: 15px;
            mask-border-repeat: stretch;
        }

        .day-prev { background-color: #a8ffff; color: #72d6d6; }
        .day-current { background-color: #ffffff; color: #444; }
        .day-next { background-color: #ffe89e; color: #e5c45e; }
        .color-sun { color: #ff5b5b !important; }
        .color-sat { color: #9c65ff !important; }

        /* 右側：タスクサイドバー */
        .task-window { 
            width: 260px; 
            background: #ffffff; 
            border-radius: 20px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
            -webkit-mask-image: radial-gradient(circle 15px at 0 0, transparent 15px, black 16px);
            mask-image: radial-gradient(circle 15px at 0 0, transparent 15px, black 16px);
        }

        .task-list { 
            flex: 1; 
            overflow-y: auto; 
            margin-top: 10px;
            padding-right: 5px;
        }
        .task-list::-webkit-scrollbar { width: 5px; }
        .task-list::-webkit-scrollbar-thumb { background: #c9e9ea; border-radius: 10px; }

        .task-item { 
            background: #f0fdfd; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 10px; 
            font-size: 14px;
            font-weight: bold; 
            cursor: grab; 
            border-left: 5px solid #4285F4;
        }

        .placed-task { 
            background: #4285F4; 
            color: white; 
            padding: 2px 5px; 
            border-radius: 4px; 
            font-size: 10px; 
            margin-top: 2px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .add-task-btn {
            font-size: 13px; color: #888; cursor:pointer; 
            border: 2px dashed #eee; padding: 10px; border-radius: 10px; 
            text-align: center; margin-top: 5px;
        }

        .btn { padding: 12px 24px; background-color: #4285F4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="setupScreen" class="container">
    <h1 style="color: #444; font-size: 40px; margin-bottom: 10px; font-weight: bold;">boccale</h1>
    <p>日々の余白を、安心に変えるカレンダー。</p>
    <button id="authBtn" class="btn" onclick="handleLogin()">Google でログイン</button>
    <br><br>
    <button style="background:#6c757d" class="btn" onclick="startGuestMode()">アカウント無しでお試し</button>
</div>

<div id="mainApp">
    <div class="sidebar-left"></div>

    <div class="calendar-section">
        <div class="calendar-header">
            <div class="month-number" id="headerMonth">5</div>
            <div class="weekdays">
                <div class="color-sun">sun</div>
                <div>mon</div>
                <div>tue</div>
                <div>wed</div>
                <div>thu</div>
                <div>fri</div>
                <div class="color-sat">sat</div>
            </div>
        </div>
        <div class="calendar-viewport" id="calendarViewport">
            <div class="calendar-grid" id="grid-prev"></div>
            <div class="calendar-grid" id="grid-current"></div>
            <div class="calendar-grid" id="grid-next"></div>
        </div>
    </div>

    <div class="task-window">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0; font-size: 18px;">TODO</h3>
            <button onclick="handleLogout()" style="cursor:pointer; font-size: 10px; border:none; background:none; color:#bbb;">Logout</button>
        </div>
        <div class="add-task-btn" onclick="addNewTaskPrompt()">+ Add Task</div>
        <div class="task-list" id="taskList"></div>
    </div>
</div>

<script>
    // Firebase設定はユーザーのものをそのまま保持
    const firebaseConfig = {
        apiKey: "AIzaSyCbyXSgnzkOGU8269J9f8axIkbC34vb_bQ",
        authDomain: "my-calendar-app-495505.firebaseapp.com",
        projectId: "my-calendar-app-495505",
        storageBucket: "my-calendar-app-495505.firebasestorage.app",
        messagingSenderId: "228515909111",
        appId: "1:228515909111:web:9c05cb566cd021f178f2f2",
        measurementId: "G-M5R8P4D22G"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/spreadsheets');
    provider.addScope('https://www.googleapis.com/auth/drive.metadata.readonly');

    let accessToken = localStorage.getItem("google_api_token");
    let spreadsheetId = null;
    let isGuestMode = false;

    function startGuestMode() { isGuestMode = true; initCalendarApp(); }

    auth.onAuthStateChanged((user) => {
        if (isGuestMode) return;
        if (user) {
            accessToken = localStorage.getItem("google_api_token");
            if (accessToken) searchDriveForSpreadsheet();
        } else {
            document.getElementById("setupScreen").style.display = "block";
            document.getElementById("mainApp").style.display = "none";
        }
    });

    async function handleLogin() {
        const result = await auth.signInWithPopup(provider);
        accessToken = result.credential.accessToken;
        localStorage.setItem("google_api_token", accessToken);
        searchDriveForSpreadsheet();
    }

    async function searchDriveForSpreadsheet() {
        const q = `name = 'boccale-database' and trashed = false`;
        const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}`;
        const res = await fetch(url, { headers: { "Authorization": `Bearer ${accessToken}` } });
        const data = await res.json();
        if (data.files && data.files.length > 0) {
            spreadsheetId = data.files[0].id;
            initCalendarApp();
        } else {
            initCalendarApp(); 
        }
    }

    // --- ここから無限スクロールカレンダーのロジック ---
    let baseDate = new Date(2026, 4, 1); // 基準月（初期状態は2026年5月）
    let isResettingScroll = false; // スクロール調整中のフラグ

    function initCalendarApp() {
        document.getElementById("setupScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "flex";
        
        setupScrollObserver();
        renderAllGrids();
        
        if (!isGuestMode) loadTasks();
    }

    // 前月・当月・翌月の3つのカレンダーを一気に生成
    function renderAllGrids() {
        const prevDate = new Date(baseDate.getFullYear(), baseDate.getMonth() - 1, 1);
        const nextDate = new Date(baseDate.getFullYear(), baseDate.getMonth() + 1, 1);

        renderGrid(prevDate, document.getElementById('grid-prev'));
        renderGrid(baseDate, document.getElementById('grid-current'));
        renderGrid(nextDate, document.getElementById('grid-next'));

        document.getElementById('headerMonth').innerText = baseDate.getMonth() + 1;

        // スクロール位置を「真ん中の月（当月）」に合わせる
        const viewport = document.getElementById('calendarViewport');
        // gridの高さ + gap(30px) 分下げる
        viewport.scrollTop = document.getElementById('grid-current').offsetTop - 0; 
    }

    // 指定した月のグリッドを生成する関数
    function renderGrid(targetDate, container) {
        container.innerHTML = "";
        const year = targetDate.getFullYear();
        const month = targetDate.getMonth();
        const firstDayOfWeek = new Date(year, month, 1).getDay();
        const startDate = new Date(year, month, 1 - firstDayOfWeek);

        for (let i = 0; i < 42; i++) {
            const cellDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + i);
            const cellY = cellDate.getFullYear();
            const cellM = cellDate.getMonth();
            const cellD = cellDate.getDate();

            let typeClass = "day-current";
            if (cellY < year || (cellY === year && cellM < month)) typeClass = "day-prev";
            else if (cellY > year || (cellY === year && cellM > month)) typeClass = "day-next";

            if (cellDate.getDay() === 0) typeClass += " color-sun";
            if (cellDate.getDay() === 6) typeClass += " color-sat";

            const div = document.createElement("div");
            div.className = `calendar-day ${typeClass}`;
            div.innerHTML = `<span>${cellD}</span>`;

            // 当月扱い（白）の日付にだけタスクを置けるようにする仕様（元コード準拠）
            if (typeClass.includes("day-current")) {
                const dateStr = `${cellY}-${String(cellM + 1).padStart(2, '0')}-${String(cellD).padStart(2, '0')}`;
                div.id = `cell-${dateStr}`;
                div.ondragover = (e) => e.preventDefault();
                div.ondrop = (e) => {
                    const title = e.dataTransfer.getData("text");
                    renderPlacedTask(div.id, title);
                    saveTask(dateStr, title);
                };
            }
            container.appendChild(div);
        }
    }

    // スクロールを監視して、切り替わったらカレンダーを再生成する
    function setupScrollObserver() {
        const viewport = document.getElementById('calendarViewport');
        
        viewport.addEventListener('scroll', () => {
            if (isResettingScroll) return;

            const gridHeight = viewport.clientHeight;
            const scrollY = viewport.scrollTop;
            
            // スクロール位置に応じて左上の「5」などの月表示をリアルタイムに変える
            const activeIndex = Math.round(scrollY / gridHeight);
            let activeDate = new Date(baseDate);
            if (activeIndex === 0) activeDate.setMonth(baseDate.getMonth() - 1);
            else if (activeIndex === 2) activeDate.setMonth(baseDate.getMonth() + 1);
            
            document.getElementById('headerMonth').innerText = activeDate.getMonth() + 1;

            // 一番上（前月）または一番下（翌月）にスナップしきったら、基準月をずらして再描画
            if (scrollY === 0) {
                isResettingScroll = true;
                baseDate.setMonth(baseDate.getMonth() - 1);
                renderAllGrids();
                setTimeout(() => { isResettingScroll = false; }, 50);
            } else if (scrollY >= viewport.scrollHeight - gridHeight - 10) {
                isResettingScroll = true;
                baseDate.setMonth(baseDate.getMonth() + 1);
                renderAllGrids();
                setTimeout(() => { isResettingScroll = false; }, 50);
            }
        });
    }

    // タスク関連の関数
    function renderPlacedTask(cellId, title) {
        const cell = document.getElementById(cellId);
        if (cell) {
            const el = document.createElement("div");
            el.className = "placed-task";
            el.innerText = title;
            cell.appendChild(el);
        }
    }

    function addNewTaskPrompt() {
        const t = prompt("Task:");
        if (!t) return;
        const el = document.createElement("div");
        el.className = "task-item";
        el.innerText = t;
        el.draggable = true;
        el.ondragstart = (ev) => ev.dataTransfer.setData("text", t);
        document.getElementById("taskList").appendChild(el);
    }

    async function loadTasks() { /* 以前のスプレッドシート読み込みロジック */ }
    function saveTask(date, title) { /* 以前のスプレッドシート保存ロジック */ }
    function handleLogout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
