<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GAS Calendar App</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        body { margin: 40px; font-family: sans-serif; }
        #calendar { max-width: 900px; margin: 0 auto; }
        .setup-btn { display: block; margin: 20px auto; padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        .setup-btn:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">マイ・カレンダー（GAS連携テスト）</h2>
    <button class="setup-btn" onclick="startSetup()">Googleアカウントでログインして初期セットアップ</button>
    <div id="calendar"></div>

    <script>
        // 【最重要】ここにあなたの最新の「GASのウェブアプリURL」を貼り付けてください！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQCR8Oe8I0SK0f13vkaBr4ozv7FBSxjnBJqN_IfSx4wh2Mho1dY3Ow85GA1zmgGCic/exec";

        // 画面が読み込まれたら、カレンダーを起動する
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja'
            });
            calendar.render();
        });

        // ボタンを押したときに動作する関数
        function startSetup() {
            if(GAS_URL.includes("ここにあなたのGAS")){
                alert("コード内のGAS_URLをあなたのURLに書き換えてください！");
                return;
            }
            
            // 【修正の肝】裏側で通信するのではなく、新しいウィンドウで直接GASのURLを開く！
            // これにより、Google公式のログイン・権限承認画面が確実に立ち上がります。
            window.open(GAS_URL, "GoogleLogin", "width=600,height=600,menubar=no,toolbar=no");
        }
    </script>
</body>
</html>
</html>
